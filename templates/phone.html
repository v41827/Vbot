<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
<meta name="theme-color" content="#1c1c1e" />
<title>Voice awareness — phone</title>
<link rel="stylesheet" href="/static/css/style.css" />
</head>
<body class="phone">
<div id="phone-bg" class="phone-bg"></div>
<div class="phone-content">
  <div class="phone-status">
    <span id="phone-connection" class="dot"></span>
    <span id="phone-connection-label">Connecting…</span>
  </div>
  <div class="phone-big" id="phone-big">Ready</div>
  <div class="phone-hint">Keep this screen awake. Tap once to arm vibration.</div>
  <button id="phone-arm" class="btn primary big">Tap to arm</button>
  <button id="phone-test" class="btn ghost">Test buzz</button>
</div>
<script src="/static/js/phone.js"></script>
</body>
</html>
