<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Voice awareness — review</title>
<link rel="stylesheet" href="/static/css/style.css" />
</head>
<body class="review">
<header class="top">
  <div class="brand">
    <div class="logo">◎</div>
    <div>
      <h1>Session review</h1>
      <p class="muted" id="session-id">Session {{ session_id }}</p>
    </div>
  </div>
  <nav>
    <a class="pill" href="/train">New session</a>
    <a class="pill ghost" href="/">Live mode</a>
  </nav>
</header>

<div id="loading" class="loading">
  <div class="spinner"></div>
  <p class="muted">Analysing your session. This takes about 30 seconds.</p>
</div>

<div id="review" class="review-grid" hidden>
  <section class="panel score-panel">
    <div class="score-number" id="score-number">—</div>
    <div class="muted small">Session score</div>
    <div class="score-summary" id="score-summary"></div>
    <div class="strengths" id="strengths"></div>
  </section>

  <section class="panel tips-panel">
    <div class="panel-title">Three things to try</div>
    <ol class="tips" id="tips"></ol>
  </section>

  <section class="panel video-panel">
    <div class="panel-title">Playback</div>
    <video id="video" class="player" controls playsinline></video>
    <div class="track-wrap">
      <div class="track-label muted small">Volume</div>
      <canvas id="volume-canvas" class="track"></canvas>
    </div>
    <div class="track-wrap">
      <div class="track-label muted small">Emotion</div>
      <div id="emotion-track" class="emotion-track"></div>
    </div>
  </section>

  <section class="panel transcript-panel">
    <div class="panel-title">Transcript <span class="muted small">(click a word to jump)</span></div>
    <div id="transcript" class="transcript"></div>
  </section>

  <section class="panel biomarker-panel">
    <div class="panel-title">Signals</div>
    <div id="biomarkers" class="biomarkers"></div>
  </section>
</div>

<div id="failure" class="panel failure" hidden>
  <div class="panel-title">Something went wrong</div>
  <pre id="failure-detail" class="muted small"></pre>
  <a href="/train" class="btn">Try again</a>
</div>

<script>
  window.SESSION_ID = {{ session_id | tojson }};
</script>
<script src="/static/js/review.js"></script>
</body>
</html>
